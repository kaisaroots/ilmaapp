name: Ilmavaatlus

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:  # allows manual triggering

jobs:
  run-ilm:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libuv1-dev

      - name: Install R packages
        run: Rscript -e "install.packages(c('httr','jsonlite','dplyr','tidyr','ggplot2','plotly','htmlwidgets'))"

      - name: Run script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: Rscript ilm.R
        
      - name: Commit and push heatmap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "Update heatmap" || echo "No changes"
          git push
        
